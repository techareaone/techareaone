<svg width="600" height="400" viewBox="0 0 600 400"
     xmlns="http://www.w3.org/2000/svg">

  <!-- TRANSPARENT BACKGROUND -->

  <!-- ORBIT GUIDES (all perfect circles) -->
  <circle cx="300" cy="200" r="45" fill="none" stroke="grey" opacity="0.25"/>
  <circle cx="300" cy="200" r="85" fill="none" stroke="grey" opacity="0.25"/>
  <circle cx="300" cy="200" r="125" fill="none" stroke="grey" opacity="0.25"/>
  <circle cx="300" cy="200" r="165" fill="none" stroke="grey" opacity="0.18"/>

  <!-- CENTER TEXT -->
  <text x="300" y="205"
        text-anchor="middle"
        font-size="46"
        font-family="Arial Black"
        fill="black">
    TRADELY
  </text>

  <text x="300" y="235"
        text-anchor="middle"
        font-size="14"
        font-family="Arial"
        fill="black"
        opacity="0.8">
    tradely.dev
  </text>

  <!-- ORBIT 1 -->
  <circle r="4" fill="black">
    <animateMotion dur="3.2s" repeatCount="indefinite"
      path="M300,200
            m-45,0
            a45,45 0 1,1 90,0
            a45,45 0 1,1 -90,0"/>
  </circle>

  <!-- ORBIT 2 -->
  <circle r="5" fill="black">
    <animateMotion dur="5.4s" repeatCount="indefinite"
      path="M300,200
            m-85,0
            a85,85 0 1,1 170,0
            a85,85 0 1,1 -170,0"/>
  </circle>

  <!-- ORBIT 3 -->
  <circle r="6" fill="black">
    <animateMotion dur="7.6s" repeatCount="indefinite"
      path="M300,200
            m-125,0
            a125,125 0 1,1 250,0
            a125,125 0 1,1 -250,0"/>
  </circle>

  <!-- ORBIT 4 -->
  <circle r="4.5" fill="black">
    <animateMotion dur="6.1s" repeatCount="indefinite"
      path="M300,200
            m-165,0
            a165,165 0 1,1 330,0
            a165,165 0 1,1 -330,0"/>
  </circle>

</svg>
